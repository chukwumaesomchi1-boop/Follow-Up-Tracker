{% extends "base.html" %}
{% block title %}Review & Edit Follow-Up{% endblock %}

{% block content %}
<style>
  :root {
    --ide-bg: #09090b;
    --ide-header: #18181b;
    --ide-border: #27272a;
    --ide-text: #e4e4e7;
    --accent: {{ branding.color or '#6366f1' }};
    --accent-soft: color-mix(in srgb, var(--accent) 12%, transparent);
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .preview-wrapper {
    max-width: 1440px;
    margin: 0 auto;
    animation: fadeIn 0.4s ease-out;
  }

  .editor-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    background: #fff;
    padding: 16px 24px;
    border-radius: 12px;
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-sm);
    gap: 16px;
    flex-wrap: wrap;
  }

  .nav-info h2 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--text-main);
    margin: 0;
  }

  .nav-pills {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .pill {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 6px;
    text-transform: uppercase;
  }

  .pill-id {
    background: var(--border);
    color: var(--text-muted);
  }

  .pill-status {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .editor-grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 24px;
    align-items: start;
  }

  .meta-card {
    background: #fff;
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    overflow: hidden;
    position: sticky;
    top: 100px;
  }

  .meta-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-main);
    background: #fafafa;
  }

  .meta-body {
    padding: 20px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  .input-field {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border-strong);
    font-size: 14px;
    transition: 0.2s;
    margin-bottom: 16px;
    background: #fff;
    box-sizing: border-box;
  }

  .input-field:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
    outline: none;
  }

  .input-readonly {
    background: #f9fafb;
    color: #94a3b8;
    border-style: dashed;
    cursor: not-allowed;
  }

  .composer-pane {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .ide-container {
    background: var(--ide-bg);
    border-radius: 16px;
    border: 1px solid var(--ide-border);
    overflow: hidden;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
  }

  .ide-toolbar {
    background: var(--ide-header);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--ide-border);
    gap: 16px;
    flex-wrap: wrap;
  }

  .segmented-control {
    background: #27272a;
    padding: 3px;
    border-radius: 8px;
    display: flex;
    gap: 2px;
    flex-wrap: wrap;
  }

  .segment {
    position: relative;
  }

  .segment label {
    display: inline-block;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    color: #a1a1aa;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.2s;
    user-select: none;
  }

  .segment input:checked + label {
    background: #3f3f46;
    color: #fff;
  }

  .var-strip {
    background: #18181b;
    padding: 8px 20px;
    border-bottom: 1px solid var(--ide-border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .var-chip {
    background: #27272a;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid #3f3f46;
    transition: 0.2s;
  }

  .var-chip:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .code-area {
    width: 100%;
    min-height: 380px;
    background: transparent;
    color: #e4e4e7;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px;
    border: none;
    resize: vertical;
    outline: none;
    box-sizing: border-box;
  }

  .ide-footer {
    padding: 16px 20px;
    background: var(--ide-header);
    border-top: 1px solid var(--ide-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .viewport-container {
    background: #fff;
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .viewport-header {
    padding: 12px 20px;
    background: #fafafa;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .preview-frame {
    width: 100%;
    height: 500px;
    border: none;
    background: #fff;
  }

  .preview-text {
    min-height: 500px;
    padding: 24px;
    white-space: pre-wrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    background: #fff;
    color: #1f2937;
    box-sizing: border-box;
  }

  .btn-action {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: 0.2s;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn-action:disabled {
    opacity: 0.65;
    cursor: not-allowed;
  }

  .btn-save {
    background: var(--accent);
    color: #fff;
  }

  .btn-send {
    background: #27272a;
    border-color: #27272a;
    color: #fff;
  }

  .btn-reset {
    color: #f87171;
    background: transparent;
    font-size: 12px;
  }

  .btn-reset:hover {
    background: rgba(248, 113, 113, 0.1);
  }

  @media (max-width: 1100px) {
    .editor-grid {
      grid-template-columns: 1fr;
    }

    .meta-card {
      position: static;
    }
  }
</style>

<div class="preview-wrapper">
  <form method="POST" action="{{ url_for('preview_edit_all', fid=followup.id) }}" id="previewForm">
    <header class="editor-nav">
      <div class="nav-info">
        <div class="nav-pills">
          <span class="pill pill-id">REC-{{ followup.id }}</span>
          <span class="pill pill-status">{{ 'Scheduled' if followup.schedule_enabled else 'Draft' }}</span>
        </div>
        <h2>Review Campaign Content</h2>
      </div>

      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <a href="{{ url_for('dashboard') }}" class="btn-action" style="color: var(--text-muted);">
          Cancel
        </a>
        <button type="submit" class="btn-action btn-save">
          Save &amp; Close
        </button>
      </div>
    </header>

    <div class="editor-grid">
      <aside class="meta-card">
        <div class="meta-header">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
          Recipient Details
        </div>

        <div class="meta-body">
          <label class="form-label" for="client_name">Full Name</label>
          <input type="text" name="client_name" id="client_name" class="input-field" value="{{ followup.client_name or '' }}">

          <label class="form-label" for="email">Email Address</label>
          <input type="email" name="email" id="email" class="input-field" value="{{ followup.email or '' }}">

          <label class="form-label" for="followup_type">Follow-Up Type</label>
          <input type="text" name="followup_type" id="followup_type" class="input-field" value="{{ followup.followup_type or 'general' }}">

          <label class="form-label">Next Scheduled Date</label>
          <input type="text" class="input-field input-readonly" readonly value="{{ followup.next_send_at or 'Manual Only' }}">

          <label class="form-label" for="description">Internal Briefing</label>
          <textarea name="description" id="description" class="input-field" rows="4" style="resize: vertical;">{{ followup.description or '' }}</textarea>
        </div>
      </aside>

      <div class="composer-pane">
        <div class="ide-container">
          <div class="ide-toolbar">
            <div style="color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; gap:8px;">
              <span style="color:#10b981;">●</span> Message Composer
            </div>

            <div class="segmented-control" role="radiogroup" aria-label="Email format">
              <div class="segment">
                <input class="sr-only" type="radio" name="email_format" id="f_text" value="text"
                  {% if followup.email_format == 'text' %}checked{% endif %}>
                <label for="f_text">Plain Text</label>
              </div>

              <div class="segment">
                <input class="sr-only" type="radio" name="email_format" id="f_html" value="html"
                  {% if followup.email_format == 'html' or not followup.email_format %}checked{% endif %}>
                <label for="f_html">Branded Template</label>
              </div>

              <div class="segment">
                <input class="sr-only" type="radio" name="email_format" id="f_raw" value="raw"
                  {% if followup.email_format == 'raw' %}checked{% endif %}>
                <label for="f_raw">Raw HTML</label>
              </div>
            </div>
          </div>

          <div class="var-strip">
            <button type="button" class="var-chip" data-var="{% raw %}{{name}}{% endraw %}">{% raw %}{{name}}{% endraw %}</button>
            <button type="button" class="var-chip" data-var="{% raw %}{{company_name}}{% endraw %}">{% raw %}{{company_name}}{% endraw %}</button>
            <button type="button" class="var-chip" data-var="{% raw %}{{type}}{% endraw %}">{% raw %}{{type}}{% endraw %}</button>
            <button type="button" class="var-chip" data-var="{% raw %}{{sender}}{% endraw %}">{% raw %}{{sender}}{% endraw %}</button>
            <button type="button" class="var-chip" data-var="{% raw %}{{support_email}}{% endraw %}">{% raw %}{{support_email}}{% endraw %}</button>
            <button type="button" class="var-chip" data-var="{% raw %}{{due_date}}{% endraw %}">{% raw %}{{due_date}}{% endraw %}</button>
          </div>

          <textarea class="code-area" name="message_override" id="message_override" spellcheck="false">{{ followup.message_override or '' }}</textarea>

          <div class="ide-footer">
            <button
              type="submit"
              formaction="{{ url_for('preview_reset', fid=followup.id) }}"
              class="btn-action btn-reset"
              onclick="return confirm('Erase custom draft and use global template?');"
            >
              Reset to Global Template
            </button>

            <button type="submit" formaction="{{ url_for('send_followup', fid=followup.id) }}" class="btn-action btn-send">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              Send Now
            </button>
          </div>
        </div>

        <div class="viewport-container">
          <div class="viewport-header">
            <div style="font-size:12px; font-weight:800; color:var(--text-main);">LIVE PREVIEW</div>
            <div id="previewStatus" style="font-size:11px; font-weight:700; color:var(--accent);">READY</div>
          </div>

          <div id="previewTextBox" class="preview-text" hidden></div>

          <iframe
            id="livePreviewFrame"
            class="preview-frame"
            sandbox=""
            srcdoc="<p style='padding:20px; font-family:sans-serif;'>Loading preview...</p>"
            title="Live email preview"
          ></iframe>
        </div>
      </div>
    </div>
  </form>
</div>

<script>
  (() => {
    const editor = document.getElementById("message_override");
    const frame = document.getElementById("livePreviewFrame");
    const previewTextBox = document.getElementById("previewTextBox");
    const statusEl = document.getElementById("previewStatus");

    const clientNameEl = document.getElementById("client_name");
    const emailEl = document.getElementById("email");
    const followupTypeEl = document.getElementById("followup_type");
    const descriptionEl = document.getElementById("description");

    let refreshTimer = null;
    let currentController = null;
    let latestRequestId = 0;

    function getSelectedEmailFormat() {
      const selected = document.querySelector('input[name="email_format"]:checked');
      return selected ? selected.value : "html";
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function showTextPreview(text) {
      frame.hidden = true;
      previewTextBox.hidden = false;
      previewTextBox.textContent = text;
    }

    function showHtmlPreview(html) {
      previewTextBox.hidden = true;
      frame.hidden = false;
      frame.srcdoc = html;
    }

    function insertVar(token) {
      const start = editor.selectionStart ?? editor.value.length;
      const end = editor.selectionEnd ?? editor.value.length;
      const before = editor.value.slice(0, start);
      const after = editor.value.slice(end);

      editor.value = before + token + after;
      editor.focus();

      const newPos = start + token.length;
      editor.setSelectionRange(newPos, newPos);

      scheduleRefresh();
    }

    function normalizePlainText(rawMessage) {
      if (!rawMessage) return "";

      const lines = String(rawMessage).replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
      const formatted = [];

      for (const line of lines) {
        const rightTrimmed = line.replace(/\s+$/, "");
        const stripped = rightTrimmed.trim();

        if (!stripped) {
          formatted.push("");
          continue;
        }

        if (stripped.startsWith("-") || stripped.startsWith("*")) {
          formatted.push("• " + stripped.slice(1).trim());
          continue;
        }

        formatted.push(rightTrimmed);
      }

      return formatted.join("\n");
    }

    function resolvePreviewVars(text) {
      const vars = {
        name: clientNameEl.value.trim() || "there",
        company_name: "{{ branding.company_name or '' }}",
        type: followupTypeEl.value.trim() || "follow-up",
        sender: "{{ branding.company_name or '' }}",
        support_email: "{{ branding.support_email or '' }}",
        due_date: "{{ followup.next_send_at or '' }}"
      };

      return String(text).replace(/\{\{\s*(name|company_name|type|sender|support_email|due_date)\s*\}\}/g, (_, key) => {
        return vars[key] ?? "";
      });
    }

    function getPayload() {
      return {
        client_name: clientNameEl.value,
        email: emailEl.value,
        followup_type: followupTypeEl.value,
        description: descriptionEl.value,
        email_format: getSelectedEmailFormat(),
        message_override: editor.value,
        preferred_channel: "email"
      };
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(refreshPreview, 350);
    }

    async function refreshPreview() {
      const requestId = ++latestRequestId;

      if (currentController) {
        currentController.abort();
      }

      currentController = new AbortController();
      const payload = getPayload();
      const emailFormat = payload.email_format;

      setStatus("SYNCHRONIZING...");

      try {
        if (emailFormat === "text") {
          const raw = (payload.message_override || "").trim() || (payload.description || "").trim();
          const resolved = resolvePreviewVars(raw);
          const formatted = normalizePlainText(resolved);

          if (requestId !== latestRequestId) return;

          showTextPreview(formatted);
          setStatus("LIVE");
          return;
        }

        const response = await fetch("{{ url_for('preview_render_email', fid=followup.id) }}", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Requested-With": "XMLHttpRequest"
          },
          body: JSON.stringify(payload),
          signal: currentController.signal
        });

        if (!response.ok) {
          throw new Error(`Preview failed with status ${response.status}`);
        }

        const html = await response.text();

        if (requestId !== latestRequestId) return;

        showHtmlPreview(html);
        setStatus("LIVE");
      } catch (error) {
        if (error.name === "AbortError") {
          return;
        }

        if (requestId !== latestRequestId) return;

        showTextPreview("Preview could not be loaded right now.");
        setStatus("SYNC ERROR");
        console.error("Preview refresh failed:", error);
      }
    }

    document.querySelectorAll(".var-chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        insertVar(chip.dataset.var || "");
      });
    });

    [editor, clientNameEl, emailEl, followupTypeEl, descriptionEl].forEach((el) => {
      el.addEventListener("input", scheduleRefresh);
    });

    document.querySelectorAll('input[name="email_format"]').forEach((el) => {
      el.addEventListener("change", scheduleRefresh);
    });

    window.addEventListener("load", refreshPreview);
  })();
</script>
{% endblock %}
