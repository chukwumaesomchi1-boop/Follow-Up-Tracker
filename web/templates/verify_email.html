{% extends "base.html" %}
{% block content %}

<style>
  .wrap {
    max-width: 560px;
    margin: 80px auto;
    text-align: center;
    padding: 0 20px;
  }

  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 18px;
    padding: 40px 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }

  .code {
    font-size: 72px;
    font-weight: 1000;
    margin: 0;
    letter-spacing: -2px;
    color: #111827;
  }

  .title {
    margin-top: 10px;
    font-size: 20px;
    font-weight: 900;
    color: #0f172a;
  }

  .sub {
    margin-top: 8px;
    font-size: 14px;
    color: #64748b;
    line-height: 1.6;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 24px;
    padding: 12px 18px;
    border-radius: 12px;
    background: #111827;
    color: #fff;
    text-decoration: none;
    font-weight: 900;
    border: 1px solid #111827;
  }

  .btn:hover {
    background: #0b1220;
  }
</style>

<div class="wrap">
  <div class="card">
    <h1 class="code">404</h1>
    <div class="title">This page doesn’t exist.</div>
    <div class="sub">
      The link might be broken, or this feature is currently unavailable.
    </div>

    <a href="{{ url_for('dashboard') }}" class="btn">
      Go back home
    </a>
  </div>
</div>

{% endblock %}
