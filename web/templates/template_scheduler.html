{% extends "base.html" %}
{% block content %}

<style>
  /* Wrapper: Narrowed the max-width slightly for a better single-button card proportion */
  .auth-wrap { 
    max-width: 420px; 
    margin: 40px auto; 
    padding: 0 16px; 
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  /* Card: Added softer, layered shadows and refined padding */
  .card { 
    background: #ffffff; 
    border: 1px solid #f1f5f9; 
    border-radius: 16px; 
    padding: 40px 32px; 
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.05); 
    text-align: center; 
  }

  /* Typography: Dropped font weights from 950 (which can render harshly) to 700/600 */
  .title { 
    margin: 0; 
    font-size: 24px; 
    font-weight: 700; 
    color: #0f172a;
  }
  .sub { 
    margin-top: 8px; 
    color: #64748b; 
    font-size: 14px; 
    line-height: 1.5; 
  }

  /* Button: Updated to follow Google's standard Sign-In button design guidelines */
  .btn-google {
    display: inline-flex; 
    justify-content: center; 
    align-items: center; 
    gap: 12px;
    width: 100%; 
    padding: 12px 16px; 
    margin-top: 28px;
    background: #ffffff;
    color: #334155;
    font-size: 15px;
    font-weight: 600; 
    text-decoration: none; 
    border: 1px solid #cbd5e1; 
    border-radius: 8px; 
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    transition: all 0.2s ease;
    cursor: pointer; 
  }
  .btn-google:hover { 
    background: #f8fafc; 
    border-color: #94a3b8;
  }
  .btn-google svg {
    width: 20px;
    height: 20px;
  }

  /* Footer Links: Improved contrast for accessibility */
  .tiny { 
    font-size: 12px; 
    margin-top: 24px; 
    color: #94a3b8; 
    line-height: 1.6; 
  }
  .tiny a { 
    color: #0284c7; 
    font-weight: 600; 
    text-decoration: none; 
    transition: color 0.2s ease;
  }
  .tiny a:hover { 
    color: #0369a1;
    text-decoration: underline; 
  }
</style>

<div class="auth-wrap">
  <div class="card">
    <h2 class="title">Welcome back</h2>
    <div class="sub">Sign in securely using your Google account.</div>

    <a class="btn-google" href="{{ url_for('auth_google') }}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </a>

    <div class="tiny">
      By continuing, you agree to our <br>
      <a href="#">Terms of Service</a> and 
      <a href="#">Privacy Policy</a>.
    </div>
  </div>
</div>

{% endblock %}
